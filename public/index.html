<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MinimaAds</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    /* ── MinimaAds identity ──────────────────────────────────────────── */
    :root {
      --pico-font-family-sans-serif: ui-sans-serif, system-ui, -apple-system,
        BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --pico-border-radius: 0.5rem;
      --pico-line-height: 1.6;
    }
    header { position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--pico-muted-border-color, #e5e7eb); background: var(--pico-background-color, #fff); }
    button, [role="button"], input, select, textarea { transition: background-color .15s ease, border-color .15s ease, box-shadow .15s ease, color .15s ease, opacity .15s ease; }
    article { transition: box-shadow .15s ease; }

    /* ── Accent: Indigo (default) — [data-theme="light"] per guanyar a PicoCSS ── */
    :root, [data-theme="light"] { --pico-primary: #6366f1; --pico-primary-background: #6366f1; --pico-primary-hover-background: #4f46e5; --pico-primary-border: #6366f1; --pico-primary-focus: rgba(99,102,241,.25); --pico-primary-inverse: #fff; }
    [data-theme="dark"] { --pico-primary: #818cf8; --pico-primary-background: #818cf8; --pico-primary-hover-background: #6366f1; --pico-primary-border: #818cf8; --pico-primary-focus: rgba(129,140,248,.25); }
    /* ── Accent: Emerald ──────────────────────────────────────────────── */
    [data-accent="emerald"], [data-accent="emerald"][data-theme="light"] { --pico-primary: #059669; --pico-primary-background: #059669; --pico-primary-hover-background: #047857; --pico-primary-border: #059669; --pico-primary-focus: rgba(5,150,105,.25); }
    [data-accent="emerald"][data-theme="dark"] { --pico-primary: #34d399; --pico-primary-background: #34d399; --pico-primary-hover-background: #10b981; --pico-primary-border: #34d399; }
    /* ── Accent: Orange ───────────────────────────────────────────────── */
    [data-accent="orange"], [data-accent="orange"][data-theme="light"] { --pico-primary: #ea580c; --pico-primary-background: #ea580c; --pico-primary-hover-background: #c2410c; --pico-primary-border: #ea580c; --pico-primary-focus: rgba(234,88,12,.25); }
    [data-accent="orange"][data-theme="dark"] { --pico-primary: #fb923c; --pico-primary-background: #fb923c; --pico-primary-hover-background: #f97316; --pico-primary-border: #fb923c; }
    /* ── Accent: Slate ────────────────────────────────────────────────── */
    [data-accent="slate"], [data-accent="slate"][data-theme="light"] { --pico-primary: #475569; --pico-primary-background: #475569; --pico-primary-hover-background: #334155; --pico-primary-border: #475569; --pico-primary-focus: rgba(71,85,105,.25); }
    [data-accent="slate"][data-theme="dark"] { --pico-primary: #94a3b8; --pico-primary-background: #94a3b8; --pico-primary-hover-background: #cbd5e1; --pico-primary-border: #94a3b8; }
    /* ── Settings UI ──────────────────────────────────────────────────── */
    .ma-accent-swatch { width: 2.2rem; height: 2.2rem; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; padding: 0; margin: 0; flex-shrink: 0; }
    .ma-accent-swatch.active { box-shadow: 0 0 0 3px var(--pico-background-color,#fff), 0 0 0 5.5px currentColor; }
    .ma-theme-mode-btn { flex: 1; width: auto; margin: 0; }
    .ma-theme-mode-btn.active { background: var(--pico-primary-background,#6366f1) !important; color: #fff !important; border-color: var(--pico-primary-border,#6366f1) !important; font-weight: 600; }

    body { max-width: 960px; margin: 0 auto; padding: 0 1rem; }
    nav ul { list-style: none; display: flex; gap: 1.5rem; padding: 0; }
    nav a { text-decoration: none; }
    nav a[aria-current] { font-weight: bold; border-bottom: 2px solid currentColor; }
    .ma-ad-banner { background: var(--pico-card-background-color, #fff); border: 1px solid var(--pico-muted-border-color, #ddd); border-radius: 0.5rem; width: 100%; }
    .ma-section { background: var(--pico-card-background-color, #fff); border: 1px solid var(--pico-muted-border-color, #ddd); border-radius: 0.4rem; padding: 0.75rem 1rem; margin: 0 0 1rem; }
    .ma-section-title { display: block; font-weight: bold; font-size: 0.9rem; margin: 0 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--pico-muted-border-color, #ddd); }
    .ma-autobalance-row { background: var(--pico-card-sectionning-background-color, #f0f4f8); border-radius: 0.3rem; padding: 0.5rem 0.75rem; margin-bottom: 0.75rem; }
    .ma-summary-box { background: var(--pico-card-background-color, #f8f9fa); border: 1px solid var(--pico-muted-border-color, #ddd); border-radius: 0.4rem; padding: 0.75rem 1rem; margin: 0.5rem 0 1rem; }
    .ma-summary-box ul { margin: 0.25rem 0 0.5rem; padding-left: 1.25rem; }
    .ma-summary-box small { color: var(--pico-muted-color, #6c757d); }
    .ma-summary-warning { color: var(--pico-del-color, #c0392b); font-weight: bold; margin-bottom: 0.5rem; }
    .ma-cap-auto { opacity: 0.65; }
    .ma-creator-overview { margin: 0 0 1rem; }
    .ma-tabs { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 0 0 1rem; border-bottom: 1px solid var(--pico-muted-border-color, #ddd); }
    .ma-tabs button { width: auto; margin: 0; border-radius: 0.35rem 0.35rem 0 0; border-bottom: 0; padding: 0.45rem 0.75rem; font-size: 0.9rem; color: #fff; }
    .ma-tabs button[aria-selected="true"] { background: var(--pico-primary-background, #0172ad); color: #fff; border-color: var(--pico-primary-border, #0172ad); font-weight: 600; }
    .ma-tabs button[aria-selected="false"] { background: var(--pico-secondary-background, #5d6b89); color: #fff; border-color: var(--pico-secondary-border, #5d6b89); }
    .ma-tab-panel[hidden] { display: none; }
    #app { min-height: 12rem; }
    /* Hamburger menu button */
    .ma-menu-btn { width: auto; margin: 0; padding: .25rem .65rem; font-size: .9rem; border-radius: .25rem; display: flex; align-items: center; gap: .4rem; white-space: nowrap; }
    /* Drawer overlay */
    #ma-drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; display: none; }
    #ma-drawer-overlay.open { display: block; }
    /* Drawer panel */
    #ma-drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; background: var(--pico-background-color, #fff); box-shadow: 2px 0 16px rgba(0,0,0,.18); z-index: 101; transform: translateX(-100%); transition: transform .25s ease; overflow-y: auto; padding: 0; display: flex; flex-direction: column; }
    #ma-drawer.open { transform: translateX(0); }
    .ma-drawer-section { padding: 1.25rem 1rem; border-bottom: 1px solid var(--pico-muted-border-color, #ddd); }
    .ma-drawer-header { display: flex; align-items: center; justify-content: space-between; gap: .75rem; }
    .ma-drawer-identity { display: flex; align-items: center; gap: .75rem; min-width: 0; }
    .ma-drawer-avatar { width: 2.75rem; height: 2.75rem; border-radius: 50%; background: var(--pico-primary-background, #0172ad); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; flex-shrink: 0; margin: 0; }
    .ma-drawer-mx { font-size: .8rem; color: var(--pico-muted-color, #6c757d); font-family: monospace; word-break: break-all; min-width: 0; }
    .ma-drawer-menu { list-style: none; margin: 0; padding: 0; }
    .ma-drawer-menu > li { border-bottom: 1px solid var(--pico-muted-border-color, #eee); }
    .ma-drawer-menu > li:last-child { border-bottom: 0; }
    .ma-drawer-menu-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; background: none; border: none; padding: .8rem 1rem; font-size: 1rem; cursor: pointer; color: inherit; text-align: left; border-radius: 0; margin: 0; }
    .ma-drawer-menu-btn:hover:not([disabled]) { background: var(--pico-card-sectionning-background-color, #f0f4f8); }
    .ma-drawer-menu-btn[disabled] { opacity: .45; cursor: default; }
    .ma-drawer-role-arrow { font-size: .85rem; color: var(--pico-muted-color, #6c757d); transition: transform .2s; }
    .ma-drawer-role-arrow.open { transform: rotate(90deg); }
    .ma-drawer-submenu { list-style: none; margin: 0; padding: 0; background: var(--pico-card-sectionning-background-color, #f0f4f8); }
    .ma-drawer-submenu li button { display: block; width: 100%; background: none; border: none; padding: .65rem 1.75rem; font-size: .95rem; cursor: pointer; text-align: left; color: inherit; margin: 0; border-radius: 0; }
    .ma-drawer-submenu li button:hover { background: var(--pico-muted-border-color, #ddd); }
    .ma-drawer-submenu li button[aria-selected="true"] { font-weight: 700; color: var(--pico-primary, #0172ad); }
    /* 1A-1: Responsive nav at 375px — nav-links wrap to new row */
    @media (max-width: 479px) {
      header nav { flex-wrap: wrap; }
      header nav > ul:first-child { flex: 1 0 auto; order: 0; }
      #ma-nav-links { order: 1; flex: 0 0 100%; flex-wrap: wrap; gap: 0.75rem; }
    }
    /* M5: Creator form fieldsets */
    .ma-fieldset { border: 1px solid var(--pico-muted-border-color, #ddd); border-radius: .4rem; padding: .75rem 1rem; margin-bottom: 1rem; }
    .ma-fieldset legend { padding: 0 .4rem; font-weight: 600; font-size: .9rem; }
    /* 1A-2: Responsive tables — block container enables overflow-x scroll */
    #app table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    /* 1A-3: Creator on mobile — hide inline preview and size-toggle buttons */
    #ma-creator-preview-open-btn { display: none; }
    @media (max-width: 479px) {
      #ma-creator-preview { display: none !important; }
      #ma-preview-btn-mobile, #ma-preview-btn-desktop { display: none !important; }
      #ma-creator-preview-open-btn { display: inline-block !important; }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <ul style="gap:.6rem;align-items:center">
        <li>
          <button class="ma-menu-btn outline secondary" onclick="openDrawer()">
            &#9776; <span id="ma-menu-role-label">Viewer</span>
          </button>
        </li>
        <li>
          <a href="./" class="contrast" style="text-decoration: none;">
            <strong style="font-size: 1.25rem;">MinimaAds</strong>
          </a>
        </li>
      </ul>
      <ul id="ma-nav-links"></ul>
    </nav>
  </header>

  <main>
    <div id="app"><p aria-busy="true">Loading…</p></div>
  </main>

  <!-- Drawer overlay -->
  <div id="ma-drawer-overlay" onclick="closeDrawer()"></div>

  <!-- Drawer panel -->
  <aside id="ma-drawer">
    <!-- Section 1: Avatar + name -->
    <div class="ma-drawer-section ma-drawer-header">
      <div class="ma-drawer-identity">
        <div class="ma-drawer-avatar" id="ma-drawer-avatar-circle">?</div>
        <div class="ma-drawer-mx" id="ma-drawer-mx-text">&#8212;</div>
      </div>
    </div>
    <!-- Section 2: Menu options -->
    <div style="flex:1">
      <ul class="ma-drawer-menu">
        <li>
          <button class="ma-drawer-menu-btn" onclick="openProfileFromDrawer()">
            Profile
            <span style="font-size:.85rem;color:var(--pico-muted-color,#6c757d)">&#8250;</span>
          </button>
        </li>
        <li>
          <button class="ma-drawer-menu-btn" onclick="toggleRoleSubmenu()">
            <span>Role &mdash; <strong id="ma-drawer-role-current">Viewer</strong></span>
            <span class="ma-drawer-role-arrow" id="ma-drawer-role-arrow">&#8250;</span>
          </button>
          <ul class="ma-drawer-submenu" id="ma-drawer-role-submenu" hidden>
            <li><button id="ma-drawer-role-viewer" onclick="setModeFromDrawer('viewer')">Viewer</button></li>
            <li><button id="ma-drawer-role-creator" onclick="setModeFromDrawer('creator')">Creator</button></li>
            <li><button id="ma-drawer-role-publisher" onclick="setModeFromDrawer('publisher')">Publisher</button></li>
          </ul>
        </li>
        <li>
          <button class="ma-drawer-menu-btn" onclick="toggleSettingsSubmenu()">
            Settings
            <span class="ma-drawer-role-arrow" id="ma-drawer-settings-arrow">&#8250;</span>
          </button>
          <div id="ma-drawer-settings-panel" hidden style="padding:.75rem 1rem;background:var(--pico-card-sectionning-background-color,#f0f4f8);">
            <small style="display:block;margin-bottom:.4rem;color:var(--pico-muted-color,#6c757d);">Theme</small>
            <div style="display:flex;gap:.5rem;margin-bottom:.85rem;">
              <button class="ma-theme-mode-btn secondary" id="ma-settings-theme-light" onclick="setThemeMode('light')">Light</button>
              <button class="ma-theme-mode-btn secondary" id="ma-settings-theme-dark" onclick="setThemeMode('dark')">Dark</button>
            </div>
            <small style="display:block;margin-bottom:.5rem;color:var(--pico-muted-color,#6c757d);">Accent</small>
            <div style="display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.75rem;">
              <button class="ma-accent-swatch" id="ma-accent-indigo"  onclick="setAccent('indigo')"  title="Indigo"  style="background:#6366f1;color:#6366f1;"></button>
              <button class="ma-accent-swatch" id="ma-accent-emerald" onclick="setAccent('emerald')" title="Emerald" style="background:#059669;color:#059669;"></button>
              <button class="ma-accent-swatch" id="ma-accent-orange"  onclick="setAccent('orange')"  title="Orange"  style="background:#ea580c;color:#ea580c;"></button>
              <button class="ma-accent-swatch" id="ma-accent-slate"   onclick="setAccent('slate')"   title="Slate"   style="background:#475569;color:#475569;"></button>
            </div>
            <hr style="margin:.25rem 0 .6rem;">
            <small style="color:var(--pico-muted-color,#6c757d);">Privacy — coming soon</small>
          </div>
        </li>
        <li>
          <button class="ma-drawer-menu-btn" disabled>
            Help
            <span style="font-size:.75rem;color:var(--pico-muted-color,#6c757d)">Coming soon</span>
          </button>
        </li>
      </ul>
    </div>
  </aside>

  <dialog id="ma-profile-modal" onclick="if(event.target===this)closeProfileModal()">
    <article style="max-width:420px">
      <header>
        <button aria-label="Close" rel="prev" onclick="closeProfileModal()"></button>
        <strong>Profile</strong>
      </header>
      <div id="ma-profile-modal-body"></div>
    </article>
  </dialog>

  <!-- Minima platform bridge — must be first -->
  <script type="text/javascript" src="mds.js"></script>

  <!-- XSS sanitizer — before renderAd.js -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

  <!-- Chart.js — before stats.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <!-- Config: PLATFORM_KEY + APP_NAME constants — must be first -->
  <script src="config.js"></script>

  <!-- Core layer -->
  <script src="core/minima.js"></script>
  <script src="core/campaigns.js"></script>
  <script src="core/selection.js"></script>
  <script src="core/validation.js"></script>
  <script src="core/rewards.js"></script>
  <script src="core/channels.js"></script>
  <script src="core/frames.js"></script>

  <!-- Renderer -->
  <script src="renderer/renderAd.js"></script>

  <!-- SDK -->
  <script src="sdk/index.js"></script>

  <!-- UI helpers — shared DOM builders, must load before views -->
  <script src="dapp/views/ui-helpers.js"></script>

  <!-- Views -->
  <script src="dapp/views/creator.js"></script>
  <script src="dapp/views/viewer.js"></script>
  <script src="dapp/views/earnings.js"></script>
  <script src="dapp/views/frames.js"></script>
  <script src="dapp/views/stats.js"></script>
  <script src="dapp/views/mycampaigns.js"></script>

  <!-- Dev SQL console (Ctrl+Shift+D) -->
  <script src="dapp/views/devtools.js"></script>

  <!-- FE entry point — last -->
  <script src="dapp/app.js"></script>
</body>
</html>
